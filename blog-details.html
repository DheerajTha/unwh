<div class="container py-120">

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  fetch('assets/data/blogs.json')
    .then(res => res.json())
    .then(blogs => {
      const blog = blogs.find(b => b.id == id);
      const blogDetail = document.getElementById("blog-detail");

      if (!blog) {
        blogDetail.innerHTML = "<h2>Blog Not Found</h2>";
        return;
      }

      blogDetail.innerHTML = `
        <div class="rounded-12 overflow-hidden position-relative mb-32">
          <img src="${blog.image}" class="rounded-12 cover-img transition-2 w-100" alt="${blog.title}" />
        </div>
        <div class="pt-32 pb-24 px-16 position-relative">
           
          <h2 class="mb-24">${blog.title}</h2>
          <p class="text-neutral-500 mb-20">By ${blog.author} on ${blog.date}</p>
          <p class="text-neutral-500 mb-32">${blog.description}</p>

          ${blog.points?.length ? `
            <h6 class="mb-16 text-neutral-500 text-lg">Key Points:</h6>
            <ul class="list-dotted d-flex flex-column gap-8 mb-32">
              ${blog.points.map(point => `<li>${point}</li>`).join("")}
            </ul>
          ` : ''}

          <span class="d-block border border-neutral-30 my-32 border-dashed"></span>
          <h3 class="mb-16 text-neutral-500 text-lg">${blog.highlightTitle || ''}</h3>
          <p>${blog.content}</p>
        </div>
      `;
    });
</script>

    <script>
        window.onload = function () {
            const overlay = document.getElementById('popup1');
            const popupBox = document.getElementById('popupBox');

            // Show overlay
            overlay.classList.add('active');

            // Delay animation slightly to allow CSS transition to apply
            setTimeout(() => {
                popupBox.classList.add('show');
            }, 100);
        };

        function closePopup() {
            const overlay = document.getElementById('popup1');
            const popupBox = document.getElementById('popupBox');

            overlay.classList.remove('active');
            popupBox.classList.remove('show');
        }
    </script>
